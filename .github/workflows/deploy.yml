# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Run unit tests
        env:
          POSTGRES_PASSWORD: ci-dummy
        run: uv run pytest -v --tb=short

  release:
    name: release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --frozen --extra dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Semantic release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run semantic-release version --push
          uv run semantic-release publish

  deploy:
    name: deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PROD_DOMAIN
          script: |
            set -e
            cd /opt/automana
            git fetch origin
            git checkout -B main origin/main
            docker compose --env-file config/env/.env.prod -f deploy/docker-compose.prod.yml up -d --build --force-recreate
            echo "Waiting for app to be healthy (up to 120s)..."
            for i in $(seq 1 24); do
              if curl -fsS "https://${PROD_DOMAIN}/health" >/dev/null 2>&1; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "Health check timed out after 120s" >&2
                exit 1
              fi
              sleep 5
            done
        env:
          PROD_DOMAIN: ${{ secrets.PROD_DOMAIN }}
