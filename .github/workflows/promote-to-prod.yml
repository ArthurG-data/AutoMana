# .github/workflows/promote-to-prod.yml
# Creates (or updates) a dev → main PR automatically after CI passes on dev.
# The actual deploy to production is handled by deploy.yml on push to main.
name: Promote dev to prod

on:
  workflow_run:
    workflows: [CI]
    branches: [dev]
    types: [completed]
  workflow_dispatch:
    inputs:
      auto_merge:
        description: "Auto-merge the PR if all checks pass"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  promote:
    name: Create or update dev → main PR
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'dev')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTE_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Get commit summary (dev ahead of main)
        id: summary
        run: |
          COMMITS=$(git log origin/main..origin/dev --oneline --no-decorate | head -20)
          COUNT=$(git rev-list --count origin/main..origin/dev)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build PR body
        id: body
        env:
          COMMIT_COUNT: ${{ steps.summary.outputs.count }}
          COMMIT_LIST: ${{ steps.summary.outputs.commits }}
        run: |
          BODY="## Release: dev → main

          **${COMMIT_COUNT} commit(s) ahead of main**

          ### Changes
          \`\`\`
          ${COMMIT_LIST}
          \`\`\`

          ---
          *Auto-generated by promote-to-prod workflow. Merge to trigger production deploy.*"

          {
            echo "text<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.body.outputs.text }}
          COMMIT_COUNT: ${{ steps.summary.outputs.count }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already open — updating body"
            gh pr edit "$EXISTING" --body "$PR_BODY"
            echo "pr_number=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --base main \
              --head dev \
              --title "chore: promote dev to main (${COMMIT_COUNT} commits)" \
              --body "$PR_BODY")
            echo "Created: ${PR_URL}"
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: >
          steps.pr.outputs.pr_number != '' &&
          github.event.inputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROMOTE_PR_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --merge
          echo "Auto-merge enabled for PR #${PR_NUMBER}"
