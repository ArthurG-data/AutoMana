services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend/Frontend.Dockerfile
    container_name: automana-frontend-prod
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Backend.Dockerfile
    container_name: automana-backend-prod
    secrets:
      - backend_db_password
      - agent_db_password
      - jwt_secret_key
      - pgp_secret_key
    env_file:
      - ../config/env/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: prod
      POSTGRES_USER: ${APP_BACKEND_DB_USER}
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/backend_db_password
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "15432"
      FRONTEND_BASE_URL: https://automana.duckdns.org
      AGENT_DB_PASSWORD_FILE: /run/secrets/agent_db_password
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  proxy:
    build:
      context: ./docker/nginx
      dockerfile: nginx.Dockerfile
      args:
        NGINX_CONF: nginx.prod.conf
    container_name: automana-proxy-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
      - frontend-network
    depends_on:
      - backend
      - frontend
  redis:
    image: redis:7.0-alpine
    container_name: automana-redis-prod
    volumes:
      - redis-data:/data
      - redis-config:/usr/local/etc/redis
    networks:
      - backend-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-worker:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-celery-prod
    secrets:
      - celery_db_password
    env_file:
      - ../config/env/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: prod
      MODULES_NAMESPACE: celery
      CELERY_POOL: "prefork"
      POSTGRES_USER: ${APP_CELERY_DB_USER}
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "15432"
      POSTGRES_PASSWORD_FILE: /run/secrets/celery_db_password
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A automana.worker.main:app worker -P solo
      --loglevel=${CELERY_LOGLEVEL:-INFO}
      --concurrency=${CELERY_CONCURRENCY:-1}"
    healthcheck:
      test: ["CMD-SHELL", "celery -A automana.worker.main:app inspect ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  celery-beat:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-celery-beat-prod
    secrets:
      - celery_db_password
    env_file:
      - ../config/env/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: prod
      MODULES_NAMESPACE: celery
      CELERY_LOGLEVEL: "INFO"
      POSTGRES_USER: ${APP_CELERY_DB_USER}
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "15432"
      POSTGRES_PASSWORD_FILE: /run/secrets/celery_db_password
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A automana.worker.main:app beat
      --loglevel=${CELERY_LOGLEVEL:-INFO}
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  flower:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-flower-prod
    env_file:
      - ../config/env/.env.prod
    environment:
      CELERY_BROKER_URL: ${BROKER_URL}
      FLOWER_PORT: "5555"
      FLOWER_PERSISTENT: "True"
      FLOWER_DB: /home/appuser/flower/flower.db
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH}
    volumes:
      - flower-data-prod:/home/appuser/flower
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    networks:
      - backend-network
    command: >
      sh -c "celery -A automana.worker.main:app --broker=${BROKER_URL} flower
      --port=5555
      --persistent=True
      --db=/home/appuser/flower/flower.db
      --basic-auth=${FLOWER_BASIC_AUTH}
      --logging=info"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5555/healthcheck')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5


secrets:
  backend_db_password:
    file: ../config/secrets/backend_db_password.txt
  celery_db_password:
    file: ../config/secrets/celery_db_password.txt
  agent_db_password:
    file: ../config/secrets/agent_db_password.txt
  jwt_secret_key:
    file: ../config/secrets/jwt_secret_key.txt
  pgp_secret_key:
    file: ../config/secrets/pgp_secret_key.txt

networks:
  frontend-network:  # nginx <-> backend
    driver: bridge
  backend-network:   # backend <-> redis <-> celery
    driver: bridge
volumes:
  redis-data:
  redis-config:
  flower-data-prod:
