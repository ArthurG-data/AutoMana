services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend/Frontend.Dockerfile
    container_name: automana-frontend-prod
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Backend.Dockerfile
    container_name: automana-backend-prod
    secrets:
      - backend_db_password
      - agent_db_password
      - jwt_secret_key
      - pgp_secret_key
    env_file:
      - ../config/env/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: prod
      POSTGRES_USER: ${APP_BACKEND_DB_USER}
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/backend_db_password
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: "15432"
      FRONTEND_BASE_URL: https://automana.duckdns.org
      AGENT_DB_PASSWORD_FILE: /run/secrets/agent_db_password
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  proxy:
    build:
      context: ./docker/nginx
      dockerfile: nginx.Dockerfile
      args:
        NGINX_CONF: nginx.prod.conf
    container_name: automana-proxy-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
      - frontend-network
    depends_on:
      - backend
      - frontend
  redis:
    image: redis:7.0-alpine
    container_name: automana-redis-prod
    volumes:
      - redis-data:/data
      - redis-config:/usr/local/etc/redis
    networks:
      - backend-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

secrets:
  backend_db_password:
    file: ../config/secrets/backend_db_password.txt
  agent_db_password:
    file: ../config/secrets/agent_db_password.txt
  jwt_secret_key:
    file: ../config/secrets/jwt_secret_key.txt
  pgp_secret_key:
    file: ../config/secrets/pgp_secret_key.txt

networks:
  frontend-network:  # nginx <-> backend
    driver: bridge
  backend-network:   # backend <-> redis <-> celery
    driver: bridge
volumes:
  redis-data:
  redis-config:
