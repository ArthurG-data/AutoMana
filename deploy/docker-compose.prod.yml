services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    #image: timescale-pgvector:pg17
    container_name: automana-postgres-prod
    shm_size: '256m'
    secrets:
      - admin_db_password
      - backend_db_password
      - celery_db_password
      - agent_db_password
      - readonly_db_password
    env_file:
      - ../config/env/.env.prod
    environment:
      POSTGRES_USER: ${AUTOMANA_ADMIN_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/admin_db_password
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - /mnt/postgres-data/pgdata:/var/lib/postgresql/data
      - ../infra/db/init/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
            - backend-network
  db-backup-prod:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../config/env/.env.prod
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_CRON: ${BACKUP_CRON}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY}
    volumes:
      - ./backups/prod:/backups
    networks:
      - backend-network
    entrypoint: ["/bin/bash","-lc"]
    command:
      - |
        set -e
        apt-get update && apt-get install -y --no-install-recommends cron gzip ca-certificates curl unzip
        curl -fsSL https://downloads.rclone.org/v1.68.2/rclone-v1.68.2-linux-amd64.zip -o /tmp/rclone.zip
        unzip -q /tmp/rclone.zip -d /tmp && mv /tmp/rclone-*/rclone /usr/local/bin/rclone && rm -rf /tmp/rclone*
        mkdir -p /backups
        cat > /usr/local/bin/pg_backup.sh << 'SCRIPT'
        #!/bin/bash
        set -e
        ts=$(date +%Y%m%d_%H%M%S)
        pg_dump -Fc -f "/backups/${PGDATABASE}_${ts}.dump" "${PGDATABASE}"
        ls -1t /backups/*.dump 2>/dev/null | tail -n +7 | xargs -r rm -f
        rclone copy /backups/ :b2:automana-backups/postgres/ \
          --b2-account "${B2_ACCOUNT_ID}" --b2-key "${B2_APPLICATION_KEY}" --min-age 2h
        rclone delete :b2:automana-backups/postgres/ --min-age 7d \
          --b2-account "${B2_ACCOUNT_ID}" --b2-key "${B2_APPLICATION_KEY}"
        SCRIPT
        chmod +x /usr/local/bin/pg_backup.sh
        echo "$$BACKUP_CRON root /usr/local/bin/pg_backup.sh" > /etc/cron.d/pgbackup
        chmod 0644 /etc/cron.d/pgbackup
        crontab /etc/cron.d/pgbackup
        cron -f
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Backend.Dockerfile
    container_name: automana-backend-prod
    secrets:
      - backend_db_password
      - agent_db_password
      - jwt_secret_key
      - pgp_secret_key
    env_file:
      - ../config/env/.env.prod
    environment:
      ENV: prod
      POSTGRES_USER: ${APP_BACKEND_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/backend_db_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      FRONTEND_BASE_URL: https://automana.duckdns.org
      AGENT_DB_PASSWORD_FILE: /run/secrets/agent_db_password
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
  proxy:
    build:
      context: ./docker/nginx
      dockerfile: nginx.Dockerfile
      args:
        NGINX_CONF: nginx.prod.conf
    container_name: automana-proxy-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
      - frontend-network
    depends_on:
      - backend
  redis:
    image: redis:7.0-alpine
    container_name: automana-redis-prod
    volumes:
      - redis-data:/data
      - redis-config:/usr/local/etc/redis
    networks:
      - backend-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-worker:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-celery-prod
    secrets:
      - celery_db_password
    env_file:
      - ../config/env/.env.prod
    environment:
      ENV: prod
      MODULES_NAMESPACE: celery
      CELERY_POOL: "prefork"
      POSTGRES_USER: ${APP_CELERY_DB_USER}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_PASSWORD_FILE: /run/secrets/celery_db_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A automana.worker.main:app worker -P solo
      --loglevel=${CELERY_LOGLEVEL:-INFO}
      --concurrency=${CELERY_CONCURRENCY:-1}"
    healthcheck:
      test: ["CMD-SHELL", "celery -A automana.worker.main:app inspect ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  celery-beat:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-celery-beat-prod
    secrets:
      - celery_db_password
    env_file:
      - ../config/env/.env.prod
    environment:
      ENV: prod
      MODULES_NAMESPACE: celery
      CELERY_LOGLEVEL: "INFO"
      POSTGRES_USER: ${APP_CELERY_DB_USER}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_PASSWORD_FILE: /run/secrets/celery_db_password
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A automana.worker.main:app beat
      --loglevel=${CELERY_LOGLEVEL:-INFO}
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
  flower:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-flower-prod
    env_file:
      - ../config/env/.env.prod
    environment:
      CELERY_BROKER_URL: ${BROKER_URL}
      FLOWER_PORT: "5555"
      FLOWER_PERSISTENT: "True"
      FLOWER_DB: /home/appuser/flower/flower.db
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH}
    volumes:
      - flower-data-prod:/home/appuser/flower
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    networks:
      - backend-network
    command: >
      sh -c "celery -A automana.worker.main:app --broker=${BROKER_URL} flower
      --port=5555
      --persistent=True
      --db=/home/appuser/flower/flower.db
      --basic-auth=${FLOWER_BASIC_AUTH}
      --logging=info"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5555/healthcheck')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["gpu"]
    image: ollama/ollama:latest
    container_name: automana-ollama-prod
    restart: unless-stopped
    volumes:
      - /data/ollama:/root/.ollama
    networks:
      - backend-network
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull qwen3:30b-a3b && wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

secrets:
  admin_db_password:
    file: ../config/secrets/admin_db_password.txt
  backend_db_password:
    file: ../config/secrets/backend_db_password.txt
  celery_db_password:
    file: ../config/secrets/celery_db_password.txt
  agent_db_password:
    file: ../config/secrets/agent_db_password.txt
  readonly_db_password:
    file: ../config/secrets/readonly_db_password.txt
  jwt_secret_key:
    file: ../config/secrets/jwt_secret_key.txt
  pgp_secret_key:
    file: ../config/secrets/pgp_secret_key.txt

networks:
  frontend-network:  # nginx <-> backend
    driver: bridge
  backend-network:   # backend <-> postgres <-> redis <-> celery
    driver: bridge
volumes:
  redis-data:
  redis-config:
  flower-data-prod: