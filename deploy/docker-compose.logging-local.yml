services:
  promtail-local:
    image: grafana/promtail:latest
    container_name: automana-promtail-local
    restart: unless-stopped
    environment:
      LOKI_URL: ${LOKI_URL:?set LOKI_URL=http://<vps-ip>:3100 in config/env/.env.dev}
    volumes:
      - ./vps/promtail-local-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail-local-positions:/run/promtail
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
volumes:
  promtail-local-positions:
