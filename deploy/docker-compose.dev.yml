services:
  postgres:
    build:
      context: ..
      dockerfile: deploy/docker/postgres/Dockerfile
    secrets:
        - admin_db_password
        - agent_db_password
        - readonly_db_password
        - backend_db_password
        - celery_db_password
    image: timescale-pgvector:pg17
    container_name: automana-postgres-dev
    env_file:
      - ../config/env/.env.dev
    environment:
      # Bootstrap cluster superuser. Using automana_admin (not app_admin)
      # so that `app_admin` stays a NOLOGIN group role per the design in
      # infra/db/init/02-app-roles.sql.tpl. Passing app_admin here would
      # cause the image's initdb to create it as superuser, and the init
      # template's `CREATE ROLE app_admin NOLOGIN` would be skipped by
      # its IF NOT EXISTS guard — leaving app_admin with superuser bits.
      POSTGRES_USER: ${AUTOMANA_ADMIN_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/admin_db_password
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - /data/pg_restore:/restore:ro
      - ../infra/db/init/:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTOMANA_ADMIN_DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
            - backend-network

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend/Backend.Dockerfile
    secrets:
        - backend_db_password
        - readonly_db_password
        - encryption_key
        - jwt_secret_key
        - pgp_secret_key 
    container_name: automana-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src
    env_file:
      - ../config/env/.env.dev
    environment:
      ENV: dev
      POSTGRES_USER: ${APP_BACKEND_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/backend_db_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MODULES_NAMESPACE: backend
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  proxy:
    build:
      context: ./docker/nginx
      dockerfile: nginx.Dockerfile
      args:
        NGINX_CONF: nginx.local.conf
    container_name: automana-proxy-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ../config/nginx/certs:/etc/nginx/certs:ro
      - ../config/nginx/htpasswd:/etc/nginx/htpasswd:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    depends_on:
      backend:
        condition: service_healthy
  redis:
    image: redis:7.0-alpine
    container_name: automana-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
      - redis-config-dev:/usr/local/etc/redis
    networks:
      - backend-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  celery-worker:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    volumes:
      - /data:/data
    secrets:
      - celery_db_password
    container_name: automana-celery-dev
    restart: unless-stopped
    env_file:
      - ../config/env/.env.dev
    environment:
      OUTPUT_DIR: /data/mtgjson/raw
      POSTGRES_USER: ${APP_CELERY_DB_USER}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD_FILE: /run/secrets/celery_db_password
      CELERY_POOL: "prefork"
      MODULES_NAMESPACE: celery
    depends_on:
      postgres:
          condition: service_healthy
      redis:
          condition: service_healthy
    networks:
      - backend-network

    command: >
      sh -c "celery -A automana.worker.main:app worker -P threads
      --loglevel=${CELERY_LOGLEVEL:-DEBUG}
      --concurrency=${CELERY_CONCURRENCY:-1}"
    healthcheck:
      test: ["CMD-SHELL", "celery -A automana.worker.main:app inspect ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  celery-beat:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-celery-beat-dev
    restart: unless-stopped
    env_file:
      - ../config/env/.env.dev
    secrets:
      - celery_db_password
    environment:
      CELERY_CONCURRENCY: "4"
      CELERY_LOGLEVEL: "INFO"
      CELERY_POOL: "prefork"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${APP_CELERY_DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/celery_db_password
      MODULES_NAMESPACE: celery
    depends_on:
      redis:
          condition: service_healthy
    command: >
      sh -c "celery -A automana.worker.main:app beat
      --loglevel=${CELERY_LOGLEVEL:-INFO}
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  flower:
    build:
      context: ..
      dockerfile: deploy/docker/celery/celery.Dockerfile
    container_name: automana-flower-dev
    restart: unless-stopped
    env_file:
      - ../config/env/.env.dev
    environment:
      CELERY_BROKER_URL: ${BROKER_URL}
      FLOWER_PORT: "5555"
      FLOWER_PERSISTENT: "True"
      FLOWER_DB: /home/appuser/flower/flower.db
    volumes:
      - flower-data-dev:/home/appuser/flower
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    networks:
      - backend-network
    command: >
      sh -c "celery -A automana.worker.main:app --broker=${BROKER_URL} flower
      --port=5555
      --url_prefix=flower
      --persistent=True
      --db=/home/appuser/flower/flower.db
      --logging=${CELERY_LOGLEVEL:-info}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5555/flower/healthcheck')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  ngrok:
    image: ngrok/ngrok:latest
    container_name: automana-ngrok-dev
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http --url=trolling-linseed-giddy.ngrok-free.dev --pooling-enabled proxy:8080
    networks:
      - backend-network
    depends_on:
      proxy:
        condition: service_healthy

  schema-spy:
    build:
      context: ..
      dockerfile: deploy/docker/schemaspy/Dockerfile
    container_name: automana-schemaspy-dev
    env_file:
      - ../config/env/.env.dev
    secrets:
      - readonly_db_password
    volumes:
      - ../docs/db-schema:/app/docs/db-schema
    depends_on:
      postgres:
          condition: service_healthy
    entrypoint:
    - sh
    - -c
    - |

      ls -la /drivers/
      POSTGRES_PASSWORD=$(cat /run/secrets/readonly_db_password)
      java -jar /usr/local/lib/schemaspy/schemaspy*.jar -t pgsql -host postgres -port 5432 -db automana -u app_readonly -p "$$POSTGRES_PASSWORD" -all -o /app/docs/db-schema -dp /drivers/postgresql.jar -nologo
     
    networks:
      - backend-network
secrets:
  backend_db_password:
    file: ../config/secrets/backend_db_password.txt
  celery_db_password:
    file: ../config/secrets/celery_db_password.txt
  agent_db_password:
    file: ../config/secrets/agent_db_password.txt
  readonly_db_password:
    file: ../config/secrets/readonly_db_password.txt
  admin_db_password:
    file: ../config/secrets/admin_db_password.txt
  openai_api_key:
    file: ../config/secrets/openai_api_key.txt
  jwt_secret_key:
    file: ../config/secrets/jwt_secret_key.txt
  encryption_key:
    file: ../config/secrets/encryption_key.txt
  pgp_secret_key:
    file: ../config/secrets/pgp_secret_key.txt
  tavily_api_key:
    file: ../config/secrets/tavily_api_key.txt

networks:
  backend-network:
    driver: bridge
volumes:
  pgdata-dev:
  redis-data-dev:
  redis-config-dev:
  flower-data-dev: