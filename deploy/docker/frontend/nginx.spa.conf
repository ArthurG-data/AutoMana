# nginx.spa.conf — Single Page Application (SPA) static file server
# This config is for the frontend container nginx, serving on port 80.
# The main proxy (nginx.local.conf) routes "/" traffic here via "upstream frontend".

server {
    listen 80;
    server_name _;

    # Root directory for static files (built React app from Stage 2 of Dockerfile).
    root /usr/share/nginx/html;
    index index.html;

    # Ensure correct MIME types (required for JS modules, fonts, etc).
    include /etc/nginx/mime.types;

    # ──────────────────────────────────────────────────────────────────────────
    # Hashed static assets from Vite
    # ──────────────────────────────────────────────────────────────────────────
    # Vite outputs assets with content-hash filenames:
    #   /assets/index-Df2b3A1c.js
    #   /assets/styles-9X7pK2Lm.css
    # The hash changes only when content changes. Safe to cache for 1 year.
    # This is the FASTEST caching strategy for the web.
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # index.html — must NEVER be cached
    # ──────────────────────────────────────────────────────────────────────────
    # This is the SPA shell. If cached, a new deploy with new hashed assets
    # will serve the OLD index.html pointing at DELETED JS filenames, breaking
    # the app until the user does a hard refresh (Ctrl+Shift+R).
    # Solution: never cache it. Browsers always fetch the latest.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # SPA fallback for client-side routing (TanStack Router, React Router, etc)
    # ──────────────────────────────────────────────────────────────────────────
    # When a user navigates to /cards/123 in the app, TanStack Router handles it
    # client-side. But if they reload the page or share the URL, the browser
    # makes a request to the server for /cards/123.
    # No such file exists on disk — we need to serve index.html so the SPA can
    # load and the router can parse the current URL.
    # try_files: try the requested file, then the directory, then fall back.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # Suppress logs for favicon.ico
    # ──────────────────────────────────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
