worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format json escape=json
    '{'
        '"time": "$time_iso8601",'
        '"request_id":"$request_id",'
        '"remote_addr": "$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=flower:10m rate=5r/m;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 10240;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;

    upstream fastapi_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream flower {
        server flower:5555;
        keepalive 4;
    }

    upstream frontend {
        server frontend:5173;
        keepalive 4;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Tunnel listener — plain HTTP, receives frp-forwarded traffic from VPS relay.
    server {
        listen 8080;
        server_name localhost;

        limit_req zone=perip burst=20 nodelay;

        client_max_body_size 100M;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID      $request_id;

        add_header X-Frame-Options         "SAMEORIGIN" always;
        add_header X-Content-Type-Options  "nosniff" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        location /health {
            proxy_pass            http://fastapi_backend;
            proxy_http_version    1.1;
            proxy_connect_timeout 2s;
            proxy_send_timeout    2s;
            proxy_read_timeout    2s;
            access_log off;
        }

        location = /api/integrations/ebay/auth/callback {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /api/ {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /flower/ {
            auth_basic           "AutoMana Admin";
            auth_basic_user_file /etc/nginx/htpasswd;
            limit_req zone=flower burst=3 nodelay;
            proxy_pass http://flower;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host       localhost;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    server {
        listen 443 ssl http2;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

        limit_req zone=perip burst=20 nodelay;

        client_max_body_size 100M;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        location /health {
            proxy_pass            http://fastapi_backend;
            proxy_http_version    1.1;
            proxy_connect_timeout 2s;
            proxy_send_timeout    2s;
            proxy_read_timeout    2s;
            access_log off;
        }

        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /flower/ {
            limit_req zone=flower burst=3 nodelay;
            proxy_pass http://flower;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /docs {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
