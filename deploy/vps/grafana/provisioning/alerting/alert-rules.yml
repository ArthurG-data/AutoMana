apiVersion: 1
groups:
  - orgId: 1
    name: AutoMana Error Alerts
    folder: AutoMana
    interval: 5m
    rules:
      - uid: automana-high-error-rate
        title: High Error Rate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: automana-loki
            model:
              editorMode: code
              expr: 'sum(count_over_time({level="ERROR"}[5m]))'
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    type: last
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "More than 5 errors in the last 5 minutes across all containers"
        labels: {}
        isPaused: false
